name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build for macOS
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Create artifactbundle
        run: |
          VERSION="${GITHUB_REF_NAME}"

          mkdir -p xmsnap.artifactbundle/xmsnap-macos/bin

          cp .build/apple/Products/Release/xmsnap xmsnap.artifactbundle/xmsnap-macos/bin/xmsnap

          cat > xmsnap.artifactbundle/info.json << EOF
          {
            "schemaVersion": "1.0",
            "artifacts": {
              "xmsnap": {
                "version": "${VERSION}",
                "type": "executable",
                "variants": [
                  {
                    "path": "xmsnap-macos/bin/xmsnap",
                    "supportedTriples": ["arm64-apple-macosx", "x86_64-apple-macosx"]
                  }
                ]
              }
            }
          }
          EOF

      - name: Create zip and calculate checksum
        id: archive
        run: |
          zip -r xmsnap.artifactbundle.zip xmsnap.artifactbundle
          CHECKSUM=$(swift package compute-checksum ./xmsnap.artifactbundle.zip)
          echo $CHECKSUM
          echo "CHECKSUM=${CHECKSUM}" >> $GITHUB_ENV

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"

          cat > release-notes.md << EOF
          # artifactbundle

          checksum: ${{ env.CHECKSUM }}
          EOF

          gh release create "${TAG}" \
            xmsnap.artifactbundle.zip \
            --generate-notes \
            --notes-file release-notes.md

      - name: Update Homebrew Formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          CHECKSUM="${{ env.CHECKSUM }}"
          URL="https://github.com/trickart/XcodeMCPSnapshooter/releases/download/${VERSION}/xmsnap.artifactbundle.zip"

          gh repo clone trickart/homebrew-tap /tmp/homebrew-tap

          sed -i '' \
            -e "s|url \".*\"|url \"${URL}\"|" \
            -e "s|sha256 \".*\"|sha256 \"${CHECKSUM}\"|" \
            /tmp/homebrew-tap/Formula/xmsnap.rb

          cd /tmp/homebrew-tap
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/trickart/homebrew-tap.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/xmsnap.rb
          git commit -m "xmsnap ${VERSION} に更新"
          git push